<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYLEAGUE - SYSTEM BROADCAST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        /* FRAME TV VYLEAGUE */
        .tv-case {
            position: relative;
            width: 95vw; 
            max-width: 600px;
            background-image: url('https://i.ibb.co.com/mR700Yp/vintage-tv-ref.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .tv-case::before {
            content: ""; 
            display: block; 
            padding-top: 80%;
        }

        /* AREA LAYAR CRT */
        .screen-container {
            position: absolute;
            top: 19.5%; 
            left: 18.5%;
            width: 46%; 
            height: 47%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            z-index: 5;
        }

        /* EFEK STATIC & MAX HEADROOM */
        .static-noise {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUPr8YN2/giphy.gif');
            background-size: cover;
            opacity: 0.3; 
            z-index: 8;
        }

        .max-broadcast {
            width: 100%; 
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.2);
            display: none; 
            position: relative;
            z-index: 6;
        }

        /* MENU BUTTONS */
        .vyleague-menu {
            position: absolute;
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            display: flex; 
            flex-direction: column;
            gap: 8px;
            width: 85%;
            z-index: 15;
            display: none;
        }

        .btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 5px;
            font-size: 10px;
            cursor: pointer;
            text-align: left;
            text-transform: uppercase;
        }

        /* TOMBOL POWER (KNOB KANAN) */
        .power-knob {
            position: absolute;
            bottom: 24%; 
            right: 14%;
            width: 15%; 
            height: 15%;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="tv-case">
        <div class="screen-container" id="screen">
            <div class="static-noise" id="noise"></div>
            
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56Znd4ZzJ4Nnh4Z3h4Z3h4Z3h4Z3h4Z3h4Z3h4Z3h4ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxcaXGPlhm/giphy.gif" 
                 class="max-broadcast" id="maxGif">
            
            <div class="vyleague-menu" id="menu">
                <button class="btn" onclick="window.open('https://discord.com/invite/UYgZFUCe')">[ 01 ] VYLEAGUE_FILES</button>
                <button class="btn" onclick="window.open('https://linktr.ee/yusufnaar.com')">[ 02 ] THE_OPERATOR</button>
            </div>
        </div>

        <div class="power-knob" onclick="toggleTV()"></div>
    </div>

    <script>
        let isOn = false;
        function toggleTV() {
            const noise = document.getElementById('noise');
            const max = document.getElementById('maxGif');
            const menu = document.getElementById('menu');

            if(!isOn) {
                noise.style.opacity = '0.1';
                max.style.display = 'block';
                menu.style.display = 'flex';
                isOn = true;
            } else {
                noise.style.opacity = '0.3';
                max.style.display = 'none';
                menu.style.display = 'none';
                isOn = false;
            }
        }
    </script>
</body>
</html>
