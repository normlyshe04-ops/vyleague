:root {
  --red: #ff0000;
  --cyan: #00ffff;
  --magenta: #ff00ff;
  --white: #f0f0f0;
  --black: #000000;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Share Tech Mono', monospace;
  cursor: crosshair;
  overflow: hidden;
}

/* BACKGROUND CYBER GRID */
.cyber-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0;
  transition: opacity 1s;
  background:
    linear-gradient(rgba(255,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 8s linear infinite;
}

.cyber-grid.active { opacity: 1; }

@keyframes gridMove {
  from { background-position: 0 0; }
  to { background-position: 0 40px; }
}

/* SCANLINES GLOBAL */
.global-scanlines {
  position: fixed;
  inset: 0;
  z-index: 1000;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
}

/* TV WRAPPER */
.tv-wrapper {
  position: relative;
  z-index: 10;
  width: min(90vw, 520px);
}

/* TV BODY */
.tv-body {
  position: relative;
  background: linear-gradient(145deg, #1a1a1a, #0a0a0a, #111);
  border-radius: 24px 24px 20px 20px;
  padding: 28px 28px 60px 28px;
  box-shadow:
    0 0 0 2px #222,
    0 0 0 4px #111,
    inset 0 2px 4px rgba(255,255,255,0.05),
    0 20px 60px rgba(0,0,0,0.9),
    0 0 80px rgba(255,0,0,0.05);
}

/* SCREEN BEZEL */
.screen-bezel {
  background: #050505;
  border-radius: 16px;
  padding: 12px;
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.9),
    inset 0 0 0 2px #1a1a1a;
  position: relative;
}

/* CRT SCREEN */
.screen {
  position: relative;
  width: 100%;
  padding-top: 75%;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  box-shadow:
    inset 0 0 40px rgba(0,0,0,0.8),
    0 0 20px rgba(0,0,0,0.5);
}

/* FISHEYE/CRT CURVE EFFECT */
.screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 60%,
    rgba(0,0,0,0.7) 100%
  );
  z-index: 50;
  pointer-events: none;
  border-radius: 10px;
}

/* CRT GLASS REFLECTION */
.screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.03) 0%,
    transparent 50%,
    rgba(255,255,255,0.01) 100%
  );
  z-index: 60;
  pointer-events: none;
  border-radius: 10px;
}

.screen-inner {
  position: absolute;
  inset: 0;
  border-radius: 10px;
  overflow: hidden;
}

/* OFF STATE */
.screen-off {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 40% 35%,
    rgba(30,30,30,0.4) 0%,
    #000 70%
  );
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s;
}

.screen-off .off-text {
  font-family: 'VT323', monospace;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.05);
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

/* STATIC NOISE */
.static-layer {
  position: absolute;
  inset: 0;
  z-index: 20;
  opacity: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  animation: staticAnim 0.05s steps(1) infinite;
  mix-blend-mode: screen;
}

@keyframes staticAnim {
  0% { background-position: 0 0; opacity: 0.8; }
  25% { background-position: -20px 10px; opacity: 0.6; }
  50% { background-position: 15px -10px; opacity: 0.9; }
  75% { background-position: -10px 20px; opacity: 0.7; }
  100% { background-position: 5px -15px; opacity: 0.8; }
}

/* SCANLINES ON SCREEN */
.scanlines-layer {
  position: absolute;
  inset: 0;
  z-index: 45;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.3) 3px,
    rgba(0,0,0,0.3) 4px
  );
  opacity: 0;
  transition: opacity 0.5s;
}

/* BROADCAST CONTENT */
.broadcast-layer {
  position: absolute;
  inset: 0;
  z-index: 15;
  opacity: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #000;
}

.broadcast-bg {
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 4px,
      rgba(255,0,0,0.05) 4px,
      rgba(255,0,0,0.05) 5px
    ),
    linear-gradient(180deg, #000 0%, #0a0000 50%, #000 100%);
  animation: bgPulse 2s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.85; }
}

/* MAX HEADROOM FIGURE */
.max-figure {
  position: relative;
  z-index: 5;
  text-align: center;
  animation: maxFloat 3s ease-in-out infinite;
}

@keyframes maxFloat {
  0%, 100% { transform: translateY(0) skewX(0deg); }
  25% { transform: translateY(-3px) skewX(0.5deg); }
  75% { transform: translateY(2px) skewX(-0.3deg); }
}

.max-head {
  font-family: 'VT323', monospace;
  font-size: clamp(2.5rem, 8vw, 4rem);
  color: var(--white);
  line-height: 1;
  filter: contrast(1.3);
  text-shadow:
    2px 0 var(--red),
    -2px 0 var(--cyan),
    0 0 10px rgba(255,255,255,0.5);
  animation: headGlitch 4s steps(1) infinite;
}

@keyframes headGlitch {
  0%, 90%, 100% {
    text-shadow: 2px 0 var(--red), -2px 0 var(--cyan), 0 0 10px rgba(255,255,255,0.5);
    transform: none;
  }
  91% { transform: translateX(3px); text-shadow: -3px 0 var(--red), 3px 0 var(--cyan); }
  92% { transform: translateX(-3px); text-shadow: 3px 0 var(--magenta), -3px 0 var(--cyan); }
  93% { transform: translateX(0); }
  95% { transform: skewX(5deg); }
  96% { transform: skewX(-5deg) translateX(2px); }
  97% { transform: none; }
}

.max-subtitle {
  font-family: 'VT323', monospace;
  font-size: clamp(0.7rem, 2.5vw, 1rem);
  color: var(--red);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  animation: flicker 3s steps(1) infinite;
  margin-top: 4px;
}

@keyframes flicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
  20%, 24%, 55% { opacity: 0; }
}

/* MENU OVERLAY */
.menu-overlay {
  position: absolute;
  inset: 0;
  z-index: 30;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 8% 6% 8%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.menu-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

.menu-item {
  display: block;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,0,0,0.5);
  color: var(--red);
  font-family: 'VT323', monospace;
  font-size: clamp(0.8rem, 2.5vw, 1.1rem);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 10px;
  margin: 3px 0;
  cursor: pointer;
  text-decoration: none;
  text-align: left;
  width: 100%;
  animation: menuFlicker 5s steps(1) infinite;
  transition: background 0.2s, color 0.2s;
  position: relative;
  overflow: hidden;
}

.menu-item:nth-child(2) { animation-delay: 0.3s; }
.menu-item:nth-child(3) { animation-delay: 0.6s; }

@keyframes menuFlicker {
  0%, 95%, 100% { opacity: 1; border-color: rgba(255,0,0,0.5); }
  96% { opacity: 0.3; border-color: rgba(0,255,255,0.5); color: var(--cyan); }
  97% { opacity: 1; }
  98% { opacity: 0.6; }
}

.menu-item:hover {
  background: rgba(255,0,0,0.15);
  color: var(--white);
  border-color: var(--red);
}

.menu-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,0,0,0.1), transparent);
  transform: translateX(-100%);
  transition: transform 0.3s;
}

.menu-item:hover::before { transform: translateX(100%); }

/* CHROMATIC ABERRATION LAYER */
.chromatic-layer {
  position: absolute;
  inset: 0;
  z-index: 40;
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: screen;
  background:
    linear-gradient(90deg, rgba(255,0,0,0.03) 0%, transparent 20%, transparent 80%, rgba(0,255,255,0.03) 100%);
}

/* GLITCH OVERLAY */
.glitch-overlay {
  position: absolute;
  inset: 0;
  z-index: 35;
  pointer-events: none;
  opacity: 0;
}

.glitch-bar {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--red);
  opacity: 0.8;
  animation: glitchBar 0.1s steps(1) infinite;
}

@keyframes glitchBar {
  0% { top: 20%; background: var(--red); }
  25% { top: 60%; background: var(--cyan); }
  50% { top: 40%; background: var(--white); }
  75% { top: 80%; background: var(--magenta); }
  100% { top: 10%; background: var(--red); }
}

/* TV BOTTOM CONTROLS */
.tv-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;

.control-dots {

.dot {

/* POWER KNOB */
.power-knob {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #2a2a2a, #0a0a0a);
  border: 2px solid #1a1a1a;
  box-shadow:
    0 3px 6px rgba(0,0,0,0.8),
    inset 0 1px 2px rgba(255,255,255,0.05),
    0 0 0 1px #111;
  cursor: pointer;
  position: relative;
  transition: transform 0.1s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.power-knob::after {
  content: '';
  width: 3px;
  height: 12px;
  background: #333;
  border-radius: 2px;
  position: absolute;
  top: 6px;
}

.power-knob:hover {
  box-shadow:
    0 3px 6px rgba(0,0,0,0.8),
    inset 0 1px 2px rgba(255,255,255,0.05),
    0 0 0 1px #111,
    0 0 15px rgba(255,0,0,0.3);
}

.power-knob:active { transform: scale(0.95); }
.power-knob.on { box-shadow: 0 3px 6px rgba(0,0,0,0.8), 0 0 20px rgba(255,0,0,0.5); }

.vyleague-label {
  font-family: 'VT323', monospace;

.channel-tag {

@keyframes channelFlicker {

/* SIGNAL TEXT */
.signal-text {

/* STARTUP GLITCH */
@keyframes startupGlitch {
  0% { transform: scaleX(0); opacity: 0; filter: brightness(3); }
  10% { transform: scaleX(1.05) scaleY(0.1); opacity: 1; }
  20% { transform: scaleX(0.98) scaleY(0.5); filter: brightness(2) hue-rotate(90deg); }
  30% { transform: scaleX(1.02) scaleY(0.8); filter: brightness(1.5); }
  40% { transform: scaleX(0.99) scaleY(0.95); filter: brightness(1.2) contrast(1.5); }
  50% { transform: scaleX(1.01) scaleY(1); filter: brightness(1) contrast(1.3); }
  60% { transform: none; filter: brightness(0.8) contrast(1.5); }
  70% { transform: translateX(3px); filter: brightness(1.1); }
  80% { transform: translateX(-2px); }
  90%, 100% { transform: none; filter: none; }
}

/* SHUTDOWN */
@keyframes shutdownAnim {
  0% { transform: none; opacity: 1; filter: brightness(1); }
  20% { transform: scaleY(0.1); filter: brightness(2); }
  40% { transform: scaleY(0.02) scaleX(1.1); filter: brightness(3); }
  60% { transform: scaleY(0.01) scaleX(0.5); filter: brightness(5); }
  80% { transform: scaleY(0) scaleX(0); filter: brightness(0); opacity: 0; }
  100% { transform: scaleY(0); opacity: 0; }
}

.tv-on .broadcast-layer { animation: startupGlitch 0.8s ease-out forwards; }
.tv-shutdown .screen-inner { animation: shutdownAnim 0.5s ease-in forwards; }

/* AMBIENT GLOW */
.tv-body.on {

    0 20px 60px rgba(0,0,0,0.9),
    0 0 60px rgba(255,0,0,0.15),
    0 0 120px rgba(255,0,0,0.05);
}

  </div>

  <script>
    let isOn = false;
    let glitchInterval = null;

    const tvBody = document.getElementById('tvBody');
    const screenOff = document.getElementById('screenOff');
    const staticLayer = document.getElementById('staticLayer');
    const broadcastLayer = document.getElementById('broadcastLayer');
    const scanlinesLayer = document.getElementById('scanlinesLayer');
    const chromaticLayer = document.getElementById('chromaticLayer');
    const glitchOverlay = document.getElementById('glitchOverlay');
    const menuOverlay = document.getElementById('menuOverlay');
    const channelTag = document.getElementById('channelTag');
    const signalText = document.getElementById('signalText');
    const powerKnob = document.getElementById('powerKnob');
    const cyberGrid = document.getElementById('cyberGrid');

    function toggleTV() {
      if (!isOn) {
        powerOn();
      } else {
        powerOff();
      }
    }

    function powerOn() {
      isOn = true;
      powerKnob.classList.add('on');
      tvBody.classList.add('on');

      // Static burst
      staticLayer.style.opacity = '1';
      screenOff.style.opacity = '0';

      setTimeout(() => {
        staticLayer.style.opacity = '0.4';

        // Show broadcast
        broadcastLayer.style.opacity = '1';
        broadcastLayer.style.animation = 'startupGlitch 0.8s ease-out forwards';

        // Activate layers
        scanlinesLayer.style.opacity = '1';
        chromaticLayer.style.opacity = '1';
        cyberGrid.classList.add('active');

        setTimeout(() => {
          staticLayer.style.opacity = '0.08';

          // Enable glitch
          glitchOverlay.style.opacity = '1';
          startGlitchLoop();

          // Show menu & HUD
          menuOverlay.classList.add('visible');
          channelTag.style.opacity = '0.6';
          signalText.style.opacity = '0.5';

        }, 600);
      }, 300);
    }

    function powerOff() {
      isOn = false;
      powerKnob.classList.remove('on');

      // Glitch shutdown
      staticLayer.style.opacity = '0.8';
      menuOverlay.classList.remove('visible');
      channelTag.style.opacity = '0';
      signalText.style.opacity = '0';
      glitchOverlay.style.opacity = '0';
      stopGlitchLoop();

      setTimeout(() => {
        broadcastLayer.style.opacity = '0';
        scanlinesLayer.style.opacity = '0';
        chromaticLayer.style.opacity = '0';
        cyberGrid.classList.remove('active');
        tvBody.classList.remove('on');

        setTimeout(() => {
          staticLayer.style.opacity = '0';
          screenOff.style.opacity = '1';
        }, 300);
      }, 400);
    }

    function startGlitchLoop() {
      glitchInterval = setInterval(() => {
        if (Math.random() > 0.7) {
          triggerRandomGlitch();
        }
      }, 2000);
    }

    function stopGlitchLoop() {
      if (glitchInterval) clearInterval(glitchInterval);
    }

    function triggerRandomGlitch() {
      const broadcast = document.querySelector('.max-head');
      if (!broadcast) return;

      const glitchDuration = 150 + Math.random() * 200;
      const offsetX = (Math.random() - 0.5) * 8;

      broadcast.style.transform = `translateX(${offsetX}px)`;
      broadcast.style.textShadow = `${-offsetX}px 0 #ff0000, ${offsetX}px 0 #00ffff, 0 0 10px rgba(255,255,255,0.5)`;
      staticLayer.style.opacity = '0.3';

      setTimeout(() => {
        broadcast.style.transform = '';
        broadcast.style.textShadow = '';
        staticLayer.style.opacity = '0.08';
      }, glitchDuration);
    }

    function triggerGlitchMax() {
      if (!isOn) return;

      // Intense glitch sequence
      staticLayer.style.opacity = '1';
      glitchOverlay.style.opacity = '1';
      menuOverlay.classList.remove('visible');

      const glitchSeq = [100, 150, 80, 200, 120];
      let delay = 0;

      glitchSeq.forEach((duration, i) => {
        setTimeout(() => {
          staticLayer.style.opacity = Math.random() > 0.5 ? '1' : '0.2';
          broadcastLayer.style.filter = i % 2 === 0 ?
            'hue-rotate(180deg) invert(1) contrast(2)' :
            'hue-rotate(0deg) invert(0) contrast(1)';
        }, delay);
        delay += duration;
      });

      setTimeout(() => {
        staticLayer.style.opacity = '0.08';
        broadcastLayer.style.filter = '';
        menuOverlay.classList.add('visible');
      }, delay + 200);
    }
  </script>
