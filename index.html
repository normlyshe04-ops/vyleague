<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYLEAGUE - FREKUENSI TERLARANG</title>
    <style>
        /* BASE STYLE - VIBE INDUSTRIAL GRUNGE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            color: #ff0000; /* Merah Drezzdon */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Efek Grainy/Bintik Film */
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        /* CONTAINER ALA MONITOR TABUNG (ILLUMITATI) */
        .monitor-frame {
            width: 320px;
            background: #d1d1d1; /* Warna abu-abu OS klasik */
            padding: 4px;
            border: 3px solid #666;
            box-shadow: 10px 10px 0px #ff0000; /* Shadow Merah */
            position: relative;
        }

        /* HEADER OS JADUL */
        .title-bar {
            background: #000;
            color: #fff;
            padding: 5px 10px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        /* ISI SCREEN */
        .screen {
            background: #fff; /* Putih bersih ala Illumitati */
            border: 2px inset #999;
            padding: 20px;
            text-align: center;
            position: relative;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%; /* Efek scanline monitor */
        }

        .logo-vyl {
            width: 80px;
            margin-bottom: 20px;
            filter: grayscale(1) contrast(200%);
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #000;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 4px solid #ff0000;
        }

        .subtitle {
            font-size: 10px;
            color: #333;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* TOMBOL MENU ALA OS X */
        .menu-box {
            border: 1px solid #000;
            display: flex;
            margin-bottom: 20px;
        }

        .menu-btn {
            flex: 1;
            padding: 15px 5px;
            border-right: 1px solid #000;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            background: transparent;
            transition: 0.2s;
        }

        .menu-btn:last-child { border-right: none; }

        .menu-btn:hover {
            background: #ff0000;
            color: #fff;
        }

        /* FOOTER BUTTONS */
        .footer-links {
            display: flex;
            justify-content: space-around;
            font-size: 9px;
            color: #666;
            text-decoration: underline;
        }

        /* EFEK GLITCH ALA DREZZDON */
        .glitch-text {
            position: relative;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="monitor-frame">
        <div class="title-bar">
            <span>VYLEAGUE_OS_1.0</span>
            <span>[X]</span>
        </div>
        
        <div class="screen">
            <div class="glitch-text">
                <h1>VY LEAGUE</h1>
            </div>
            <p class="subtitle">Laboratorium Digital - Est. 2025</p>

            <div class="menu-box">
                <div class="menu-btn">WORK</div>
                <div class="menu-btn">OTHER...</div>
            </div>

            <div class="footer-links">
                <span>SLEEP</span>
                <span>RESTART</span>
                <span>SHUT DOWN</span>
            </div>
        </div>
    </div>

</body>
</html>
